{% set version = environ.get("HOLOSCAN_VERSION", "4.2.0.1") %}

package:
  name: holoscan
  version: {{ version }}

{% if environ.get("HOLOSCAN_LOCAL_WHEEL_DIR") %}
source:
  path: {{ environ["HOLOSCAN_LOCAL_WHEEL_DIR"] }}
{% else %}
source:
  # CUDA 13 wheels — placeholder URLs/sha256. Replace TODO and "" with real values once
  # holoscan_cu13 wheels are published on PyPI. Local dev builds bypass this branch via
  # HOLOSCAN_LOCAL_WHEEL_DIR (see the {% if %} branch above).
  - url: "https://files.pythonhosted.org/packages/TODO/holoscan_cu13-{{ version }}-cp310-cp310-manylinux_2_35_x86_64.whl"  # [linux64 and (cuda_compiler_version or "").startswith("13") and py == 310]
    sha256: ""  # [linux64 and (cuda_compiler_version or "").startswith("13") and py == 310]
  - url: "https://files.pythonhosted.org/packages/TODO/holoscan_cu13-{{ version }}-cp311-cp311-manylinux_2_35_x86_64.whl"  # [linux64 and (cuda_compiler_version or "").startswith("13") and py == 311]
    sha256: ""  # [linux64 and (cuda_compiler_version or "").startswith("13") and py == 311]
  - url: "https://files.pythonhosted.org/packages/TODO/holoscan_cu13-{{ version }}-cp312-cp312-manylinux_2_35_x86_64.whl"  # [linux64 and (cuda_compiler_version or "").startswith("13") and py == 312]
    sha256: ""  # [linux64 and (cuda_compiler_version or "").startswith("13") and py == 312]
  - url: "https://files.pythonhosted.org/packages/TODO/holoscan_cu13-{{ version }}-cp313-cp313-manylinux_2_35_x86_64.whl"  # [linux64 and (cuda_compiler_version or "").startswith("13") and py == 313]
    sha256: ""  # [linux64 and (cuda_compiler_version or "").startswith("13") and py == 313]

  - url: "https://files.pythonhosted.org/packages/TODO/holoscan_cu13-{{ version }}-cp310-cp310-manylinux_2_35_aarch64.whl"  # [aarch64 and (cuda_compiler_version or "").startswith("13") and arm_variant_type == "sbsa" and py == 310]
    sha256: ""  # [aarch64 and (cuda_compiler_version or "").startswith("13") and arm_variant_type == "sbsa" and py == 310]
  - url: "https://files.pythonhosted.org/packages/TODO/holoscan_cu13-{{ version }}-cp311-cp311-manylinux_2_35_aarch64.whl"  # [aarch64 and (cuda_compiler_version or "").startswith("13") and arm_variant_type == "sbsa" and py == 311]
    sha256: ""  # [aarch64 and (cuda_compiler_version or "").startswith("13") and arm_variant_type == "sbsa" and py == 311]
  - url: "https://files.pythonhosted.org/packages/TODO/holoscan_cu13-{{ version }}-cp312-cp312-manylinux_2_35_aarch64.whl"  # [aarch64 and (cuda_compiler_version or "").startswith("13") and arm_variant_type == "sbsa" and py == 312]
    sha256: ""  # [aarch64 and (cuda_compiler_version or "").startswith("13") and arm_variant_type == "sbsa" and py == 312]
  - url: "https://files.pythonhosted.org/packages/TODO/holoscan_cu13-{{ version }}-cp313-cp313-manylinux_2_35_aarch64.whl"  # [aarch64 and (cuda_compiler_version or "").startswith("13") and arm_variant_type == "sbsa" and py == 313]
    sha256: ""  # [aarch64 and (cuda_compiler_version or "").startswith("13") and arm_variant_type == "sbsa" and py == 313]
{% endif %}

build:
  number: 0
  skip: true  # [not (linux64 or aarch64)]
  skip: true  # [cuda_compiler_version in (None, "None", "") or (cuda_compiler_version or "").startswith("11") or (cuda_compiler_version or "").startswith("12")]
  skip: true  # [py<310 or py>313]
  missing_dso_whitelist:
    - "*libcuda.so*"              # driver, not provided by any conda package
    - "*librmm.so*"               # RMM, available in RAPIDS channel
  ignore_run_exports:
    - cuda-version

requirements:
  build:
    - {{ compiler('c') }}
    - {{ compiler('cuda') }}
    - {{ compiler('cxx') }}
    - {{ stdlib("c") }}
    - cross-python_{{ target_platform }}    # [build_platform != target_platform]
    - python
    - cf-nvidia-tools 1  # [linux]
  host:
    - libholoscan {{ version }}
    - cuda-version {{ cuda_compiler_version }}
    - python
    - setuptools
    - pip
  run:
    - {{ pin_compatible('cuda-version', max_pin='x', min_pin='x') }}
    - cloudpickle >=3.0
    - cuda-version >={{ cuda_compiler_version_min }}
    - cupy
    - libholoscan {{ version }}.*
    - cuda-cudart
    - python

test:
  # imports:
  #   - holoscan
  requires:
    - pip
  commands:
    - test -d $SP_DIR/holoscan/
    - pip check

about:
  home: https://docs.nvidia.com/cuda/holoscan/
  license: LicenseRef-NVIDIA-End-User-License-Agreement
  license_file:
    - LICENSE
    - NOTICE
  license_url: https://developer.download.nvidia.com/assets/Clara/NVIDIA_Clara_EULA.pdf
  summary: NVIDIA Holoscan python bindings
  description: |
    NVIDIA Holoscan python bindings

extra:
  recipe-maintainers:
    - conda-forge/cuda
  feedstock-name: holoscan
