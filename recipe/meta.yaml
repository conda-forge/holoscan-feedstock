  - url: "https://files.pythonhosted.org/packages/86/62/36a6de42f4e160d4c5f299f8a2ef08951c83d9a4e8ce8c4afb8ac239f351/holoscan_cu12-4.2.0-cp312-cp312-manylinux_2_35_x86_64.whl"  # [linux64 and (cuda_compiler_version or "").startswith("12") and py == 312]
